<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="app-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <filter id="emboss-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.7" />
    </filter>

    <linearGradient id="matte-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A3F47" />
      <stop offset="100%" stop-color="#1E2025" />
    </linearGradient>

    <linearGradient id="cyan-vol" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80D0F6" />
      <stop offset="100%" stop-color="#55B5E6" />
    </linearGradient>
  </defs>

  <rect x="50" y="50" width="300" height="300" rx="75" fill="url(#matte-base)" filter="url(#app-shadow)" />

  <g filter="url(#emboss-shadow)" fill="none" stroke="url(#cyan-vol)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">

    <path d="M 120 135 A 80 80 0 0 1 280 135" />
    <path d="M 150 170 A 50 50 0 0 1 250 170" />
    <path d="M 180 205 A 20 20 0 0 1 220 205" />

    <path d="M 140 245 L 175 275 L 140 305" />
    
    <path d="M 205 305 L 260 305.01" />
    
  </g>
</svg>
