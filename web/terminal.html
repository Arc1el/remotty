<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>Remotty</title>
  <link rel="icon" href="/remotty_icon.ico">
  <link rel="stylesheet" href="/terminal.css?v=47">
</head>
<body>
  <div id="session-bar"></div>
  <div id="preview-toolbar">
    <input id="preview-path" type="text" placeholder="/" spellcheck="false" autocomplete="off">
    <button id="preview-go" title="Go">&#8594;</button>
    <button id="preview-refresh" title="Refresh">&#8635;</button>
    <a id="preview-open-external" title="Open in new tab" target="_blank">&#8599;</a>
  </div>
  <div id="main-area">
    <div id="terminal-wrap">
      <iframe id="term-frame" allowfullscreen></iframe>
      <iframe id="preview-frame" allowfullscreen></iframe>
      <div id="scroll-overlay"></div>
      <div id="voicecmd-overlay"></div>
      <div id="voicecmd-toast"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="controls">
    <button id="side-toggle" onclick="toggleSide()">&#8644;</button>
    <div id="main-controls">
      <div id="mod-keys">
        <button data-key="Escape" class="key-btn mod">Esc</button>
        <button data-key="Tab" class="key-btn mod">Tab</button>
        <button data-key="Shift" class="key-btn mod" id="shift-btn">Shift</button>
        <button data-key="C-c" class="key-btn mod">^C</button>
        <button data-key="C-d" class="key-btn mod">^D</button>
        <button class="key-btn mod" id="scroll-toggle">Scroll</button>
        <button class="key-btn mod" id="voicecmd-toggle">Voice</button>
      </div>
      <div id="quick-keys">
        <button class="key-btn quick" id="btn-claude">claude</button>
        <button class="key-btn quick" id="btn-exit">exit</button>
        <button class="key-btn quick" id="btn-back">Sessions</button>
      </div>
      <div id="dpad-and-action">
        <div id="dpad">
          <div class="mic-slot" id="mic-wide"></div>
          <div class="dpad-row">
            <button data-key="Up" class="key-btn arrow">&#9650;</button>
          </div>
          <div class="dpad-row">
            <button data-key="Left" class="key-btn arrow">&#9664;</button>
            <button data-key="Down" class="key-btn arrow">&#9660;</button>
            <button data-key="Right" class="key-btn arrow">&#9654;</button>
          </div>
        </div>
        <div id="action-keys">
          <button data-key="Enter" class="key-btn enter">Enter</button>
          <div id="action-sub">
            <button data-key="Space" class="key-btn action">Space</button>
            <button data-key="Backspace" class="key-btn action">&#9003;</button>
          </div>
        </div>
        <div class="mic-slot" id="mic-narrow"></div>
      </div>
      <button id="mic-btn">STT</button>
    </div>
    </div>
  </div>
  <div id="voice-bar" class="voice-hidden">
    <button id="voice-lang">EN</button>
    <span id="voice-text"></span>
    <button id="voice-send">&#10003;</button>
    <button id="voice-cancel">&#10005;</button>
  </div>
  <script src="/terminal.js?v=47"></script>
</body>
</html>
