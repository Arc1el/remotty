<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remotty</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Remotty</h1>
    <span id="status" class="status"></span>
  </header>
  <main id="sessions"></main>
  <button id="fab" onclick="showNewDialog()">+</button>
  <div id="dialog-overlay" onclick="hideNewDialog()">
    <div id="dialog" onclick="event.stopPropagation()">
      <input id="dialog-input" type="text" placeholder="Window name" autocomplete="off" />
      <div id="dialog-btns">
        <button id="dialog-cancel" onclick="hideNewDialog()">Cancel</button>
        <button id="dialog-ok" onclick="createWindow()">Create</button>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
