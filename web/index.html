<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remotty</title>
  <link rel="icon" href="/remotty_icon.ico">
  <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>
  <header>
    <div id="header-logo">
      <img src="/remotty.svg" alt="Remotty" style="width:32px;height:32px;object-fit:contain;">
      <h1>Remotty</h1>
    </div>
    <div id="header-right">
      <span id="status" class="status"></span>
      <button id="theme-toggle"></button>
    </div>
  </header>
  <main id="sessions"></main>
  <button id="fab" onclick="showNewDialog()">+</button>
  <div id="dialog-overlay" onclick="hideNewDialog()">
    <div id="dialog" onclick="event.stopPropagation()">
      <input id="dialog-input" type="text" placeholder="Window name" autocomplete="off" />
      <div id="dialog-btns">
        <button id="dialog-cancel" onclick="hideNewDialog()">Cancel</button>
        <button id="dialog-ok" onclick="createWindow()">Create</button>
      </div>
    </div>
  </div>
  <script src="/app.js?v=2"></script>
</body>
</html>
