# remotty tmux configuration
# Sourced alongside Kaku's managed tmux config

# Mouse support (essential for mobile touch)
set -g mouse on

# Generous scrollback
set -g history-limit 10000

# Mobile-compatible terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar: show Tailscale IP for easy reference
set -g status-right '#(tailscale ip -4 2>/dev/null || echo "no tailscale") | %H:%M'
set -g status-right-length 40

# Reduce escape delay (better responsiveness on mobile)
set -sg escape-time 10

# Automatic window renaming
set -g automatic-rename on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
